<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazerKat's Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: -1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            transition: transform 0.3s ease;
            text-align: center;
            margin: 40px auto;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5em;
            color: #2d3748;
            margin-bottom: 15px;
            font-weight: 700;
            line-height: 1.2;
        }

        p {
            font-size: 1.2em;
            color: #4a5568;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        h3 {
            font-size: 1.3em;
            color: #2d3748;
            margin-bottom: 30px;
            font-weight: 500;
            padding: 10px 15px;
            background: #fff5f5;
            border-radius: 10px;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
        }

        h2 {
            font-size: 1.8em;
            color: #2d3748;
            margin-bottom: 25px;
            font-weight: 600;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            color: #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-size: 18px;
            font-weight: 600;
            border: none;
            padding: 15px 40px;
            cursor: pointer;
            border-radius: 50px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 1;
            }
            20% {
                transform: scale(25, 25);
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(40, 40);
            }
        }

        button:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            border-radius: 20px;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            button {
                width: 100%;
                padding: 15px 20px;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    
    <div class="card">
        <h1>Hello! I am LazerKat (Hendrik van Hulst)!</h1>
        <p>I like making games, coding, and music!</p>
        <h3>I hope I haven't just doxxed myself!</h3>
        <h2>Here are some things I've made:</h2>
        
        <div class="button-container">
            <button type="button" onclick="window.open('http://lazerkatsweirdstuff.github.io/amicable-miner', '_blank')">
                Amicable Miner
            </button>
            
            <button type="button" onclick="window.open('https://github.com/lazerkatsweirdstuff/TextyOS', '_blank')">
                TextyOS
            </button>
            
            <button type="button" onclick="window.open('https://github.com/lazerkatsweirdstuff/offinternet', '_blank')">
                OffInternet
            </button>
            
            <button type="button" onclick="window.open('https://github.com/lazerkatsweirdstuff/BuildABot', '_blank')">
                BuildABot
            </button>
            
            <button type="button" onclick="window.open('https://github.com/lazerkatsweirdstuff/servercraft', '_blank')">
                ServerCraft
            </button>
            
            <button type="button" onclick="window.open('https://github.com/lazerkatsweirdstuff/accutime-watch-converter', '_blank')">
                Accutime Watch Converter
            </button>
            
            <button type="button" onclick="window.open('https://github.com/lazerkatsweirdstuff/github-client-for-kitkat', '_blank')">
                GitHub Client for kitkat
            </button>
            
            <button type="button" onclick="window.open('https://github.com/lazerkatsweirdstuff/lazerkatsprojects', '_blank')">
                LazerKat's Projects (Old)
            </button>
        </div>
    </div>
</body>
</html>
